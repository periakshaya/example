<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExamShield AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14; --surface:#121820; --surface-2:#1A2230; --surface-3:#212B3A;
    --border:#26313F; --border-soft:#1D2733;
    --text:#E7ECF1; --text-dim:#8B98A8; --text-faint:#5A6675;
    --accent:#3DD9C4; --accent-dim:#1F5F58; --accent-2:#5B8CFF;
    --risk-low:#35C46A; --risk-low-bg:rgba(53,196,106,.12);
    --risk-med:#E8B93B; --risk-med-bg:rgba(232,185,59,.12);
    --risk-high:#E8543B; --risk-high-bg:rgba(232,84,59,.14);
    --accent-3:#B48CFF; --accent-3-dim:#3A2F5C;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  #app{min-height:100vh;}
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:var(--accent);}
  ::selection{background:var(--accent);color:#00201C;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;border-radius:8px;font-weight:600;transition:.15s;}
  button:disabled{opacity:.45;cursor:not-allowed;}
  input,select,textarea{
    font-family:'Inter',sans-serif;background:var(--surface-2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;width:100%;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
  textarea{font-family:'JetBrains Mono',monospace;font-size:13px;resize:vertical;}
  label{font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:6px;}
  .field{margin-bottom:14px;}
  .btn-primary{background:var(--accent);color:#04211D;padding:11px 20px;font-size:14px;}
  .btn-primary:hover:not(:disabled){background:#4FE8D2;}
  .btn-secondary{background:var(--surface-3);color:var(--text);padding:11px 20px;font-size:14px;border:1px solid var(--border);}
  .btn-secondary:hover:not(:disabled){border-color:var(--accent);}
  .btn-danger{background:transparent;color:var(--risk-high);padding:8px 14px;font-size:13px;border:1px solid rgba(232,84,59,.4);}
  .btn-ghost{background:transparent;color:var(--text-dim);padding:8px 12px;font-size:13px;}
  .btn-ghost:hover:not(:disabled){color:var(--text);}
  .btn-block{width:100%;}
  .card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:20px;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .container{max-width:1180px;margin:0 auto;padding:0 24px;}
  .topbar{border-bottom:1px solid var(--border-soft);background:rgba(11,15,20,.9);backdrop-filter:blur(8px);position:sticky;top:0;z-index:40;}
  .topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1180px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#04211D;font-family:'Space Grotesk';font-size:15px;}
  .brand-name{font-family:'Space Grotesk';font-weight:700;font-size:16px;}
  .brand-sub{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin-top:-2px;}
  .scanline{position:relative;overflow:hidden;}
  .scanline::after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);top:0;animation:scan 3.5s linear infinite;opacity:.6;}
  @keyframes scan{0%{top:-2px;}100%{top:100%;}}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media(max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr;}}
  .tabs{display:flex;gap:4px;background:var(--surface-2);border-radius:10px;padding:4px;border:1px solid var(--border-soft);}
  .tab{flex:1;text-align:center;padding:9px 14px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;}
  .tab.active{background:var(--accent);color:#04211D;}
  .stat{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:10px;padding:16px;}
  .stat-num{font-family:'JetBrains Mono';font-size:26px;font-weight:700;}
  .stat-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;border-bottom:1px solid var(--border-soft);}
  td{padding:12px;border-bottom:1px solid var(--border-soft);}
  tr:hover td{background:var(--surface-2);}
  .risk-badge-low{background:var(--risk-low-bg);color:var(--risk-low);}
  .risk-badge-med{background:var(--risk-med-bg);color:var(--risk-med);}
  .risk-badge-high{background:var(--risk-high-bg);color:var(--risk-high);}
  .qpalette{display:flex;flex-wrap:wrap;gap:6px;}
  .qdot{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;}
  .qdot.answered{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
  .qdot.current{outline:2px solid var(--accent-2);}
  .mcq-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;}
  .mcq-opt:hover{border-color:var(--accent);}
  .mcq-opt.selected{border-color:var(--accent);background:var(--accent-dim);}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--surface-3);border:1px solid var(--accent);color:var(--text);padding:12px 18px;border-radius:8px;font-size:13px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .empty{text-align:center;padding:50px 20px;color:var(--text-dim);}
  .badge-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .flow-list{list-style:none;padding:0;margin:0;}
  .flow-list li{padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;color:var(--text-dim);display:flex;justify-content:space-between;gap:10px;}
  .flow-list li:last-child{border-bottom:none;}
  .risk-gauge{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin:0 auto;}
  .risk-gauge-inner{width:114px;height:114px;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .link-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-weight:600;padding:0;}
  code, .code-block{font-family:'JetBrains Mono',monospace;}
  .code-block{background:#0A0E13;border:1px solid var(--border-soft);border-radius:8px;padding:12px;font-size:12.5px;white-space:pre-wrap;color:#B9C4D0;}
  .divider{height:1px;background:var(--border-soft);margin:18px 0;}
  .kicker{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700;margin-bottom:6px;}
  .subtle{color:var(--text-dim);font-size:13px;}
  .ai-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--accent-2);background:rgba(91,140,255,.12);padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em;}
  .close-x{position:absolute;top:14px;right:14px;background:none;color:var(--text-dim);font-size:20px;padding:4px 10px;}
 
  /* ---- Landing ---- */
  .landing-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:40px 24px;}
  .landing-grid{position:absolute;inset:0;
    background-image:linear-gradient(var(--border-soft) 1px,transparent 1px),linear-gradient(90deg,var(--border-soft) 1px,transparent 1px);
    background-size:42px 42px; mask-image:radial-gradient(ellipse 60% 55% at 50% 40%,#000 10%,transparent 75%);
    opacity:.5;
  }
  .landing-content{position:relative;z-index:1;text-align:center;max-width:620px;}
  .hero-visual{margin:0 auto 26px;width:150px;height:150px;}
  .hero-ring{transform-origin:100px 100px;animation:spin 22s linear infinite;}
  .hero-scan{animation:scanmove 3.2s ease-in-out infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes scanmove{
    0%,100%{transform:translate(-30px,-24px);opacity:0;}
    10%{opacity:1;}
    50%{transform:translate(28px,10px);opacity:1;}
    90%{opacity:1;}
  }
  .hero-title{font-family:'Space Grotesk';font-size:34px;font-weight:700;line-height:1.25;letter-spacing:-.01em;margin-bottom:14px;}
  .hero-sub{color:var(--text-dim);font-size:15px;line-height:1.6;margin:0 auto 30px;max-width:480px;}
  .hero-stats{display:flex;gap:28px;justify-content:center;margin-top:34px;}
  .hero-stats div{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;}
  .hero-stats .mono{font-size:18px;color:var(--accent);font-weight:700;letter-spacing:0;}
 
  /* ---- Role select ---- */
  .role-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:24px;cursor:pointer;transition:.18s;border-top:3px solid transparent;}
  .role-card:hover{transform:translateY(-3px);border-color:var(--role-color);box-shadow:0 10px 28px -12px var(--role-color);}
  .role-icon{width:52px;height:52px;border-radius:12px;background:color-mix(in srgb, var(--role-color) 16%, transparent);color:var(--role-color);display:flex;align-items:center;justify-content:center;}
  .role-cta{margin-top:14px;font-size:12.5px;font-weight:700;color:var(--role-color);}
 
  /* ---- Question builder modal ---- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(4,6,9,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;position:relative;}
  .edit-btn{position:absolute;top:12px;right:44px;background:none;color:var(--text-dim);font-size:12px;padding:4px 8px;font-weight:600;}
  .edit-btn:hover{color:var(--accent);}
</style>
</head>
<body>
<div id="app"></div>
<canvas id="camCanvas" width="160" height="120" style="display:none;"></canvas>
 
<script>
/* ============================= CONSTANTS ============================= */
const DB_KEY = 'examshield_db_v1';
const STUDENT_DOMAIN = '@student.examshield.edu';
const ADMIN_ACCOUNTS = [
  { email:'admin@examshield.com', password:'Admin@123', name:'Priya Admin' }
];
const RECRUITER_ACCOUNTS = [
  { email:'recruiter@examshield.com', password:'Recruit@123', name:'Rahul Recruiter' }
];
const RISK_WEIGHTS = { tabSwitch:10, copyPaste:8, faceMissing:15, multiFace:20, fullscreenExit:10, cameraDenied:25 };
 
/* ============================= STATE ============================= */
let DB = null;
let session = null;              // {role, email, name}
let toastTimer = null;
let draftQuestions = [];         // used while building an exam in admin panel
let tempTestCases = [];          // scratch state while the coding-question modal is open
let attempt = null;              // active exam attempt state
let loginRole = 'candidate';
let loginMode = 'login';         // login | signup
let adminTab = 'create';
let currentReportId = null;
 
/* ============================= STORAGE ============================= */
async function loadDB(){
  try{
    const r = await window.storage.get('db', true);
    DB = JSON.parse(r.value);
  }catch(e){
    DB = { candidates: [], exams: [], submissions: [] };
    await saveDB();
  }
}
async function saveDB(){
  try{ await window.storage.set('db', JSON.stringify(DB), true); }
  catch(e){ console.error('Storage error', e); }
}
function uid(){ return Math.random().toString(36).slice(2,10); }
 
/* ============================= UTIL ============================= */
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(ms){
  if(ms<0) ms=0;
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const sec = s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function riskBand(score){
  if(score < 30) return {label:'Low', cls:'low', color:'var(--risk-low)'};
  if(score < 60) return {label:'Medium', cls:'med', color:'var(--risk-med)'};
  return {label:'High', cls:'high', color:'var(--risk-high)'};
}
function toast(msg){
  const el = document.createElement('div');
  el.className='toast'; el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  setTimeout(()=>el.remove(), 3200);
}
function render(html){ document.getElementById('app').innerHTML = html; }
 
/* ============================= AI HELPERS ============================= */
const AI_BACKEND_URL = 'http://localhost:8000/api/ai/generate'; // point this at your deployed FastAPI backend
 
async function callAI(system, user, maxTokens){
  try{
    const response = await fetch(AI_BACKEND_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ system, user, max_tokens: maxTokens || 1000 })
    });
    if(!response.ok){
      const errBody = await response.text();
      console.error('AI backend returned', response.status, errBody);
      throw new Error(`Backend error ${response.status}: ${errBody.slice(0,200)}`);
    }
    const data = await response.json();
    return data.text || '';
  }catch(e){
    console.error('AI call failed:', e);
    lastAIError = e.message || String(e);   // surfaced in the UI instead of a silent null
    return null;
  }
}
let lastAIError = null;
function extractJSON(text){
  if(!text) return null;
  let cleaned = text.replace(/```json/gi,'').replace(/```/g,'').trim();
  try{ return JSON.parse(cleaned); }catch(e){}
  const m = cleaned.match(/[\[{][\s\S]*[\]}]/);
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  return null;
}
 
/* ============================= INIT / ROUTER ============================= */
async function init(){
  await loadDB();
  renderLanding();
}
 
function requireSession(roles){
  if(!session || !roles.includes(session.role)){ renderRoleSelect(); return false; }
  return true;
}
 
/* ============================= TOPBAR ============================= */
function topbar(activeLabel){
  const roleLabel = session ? (session.role.charAt(0).toUpperCase()+session.role.slice(1)) : '';
  return `
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">ES</div>
        <div>
          <div class="brand-name">ExamShield AI</div>
          <div class="brand-sub">Secure Assessment Platform</div>
        </div>
      </div>
      ${session ? `
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="text-align:right;">
          <div style="font-size:13px;font-weight:600;">${esc(session.name)}</div>
          <div style="font-size:11px;color:var(--text-dim);">${roleLabel} · ${esc(session.email)}</div>
        </div>
        <button class="btn-ghost" onclick="logout()">Log out</button>
      </div>` : ''}
    </div>
  </div>`;
}
function logout(){
  if(attempt && attempt.active){ toast('Finish or submit your exam before logging out.'); return; }
  session = null; renderRoleSelect();
}
 
/* ============================= LANDING ============================= */
function renderLanding(){
  render(`
  <div class="landing-wrap">
    <div class="landing-grid"></div>
    <div class="landing-content">
      <div class="brand" style="justify-content:center;margin-bottom:34px;">
        <div class="brand-mark" style="width:42px;height:42px;font-size:19px;">ES</div>
        <div style="text-align:left;">
          <div class="brand-name" style="font-size:19px;">ExamShield AI</div>
          <div class="brand-sub">Secure Assessment & Integrity Platform</div>
        </div>
      </div>
 
      <div class="hero-visual">
        <svg viewBox="0 0 200 200" width="150" height="150">
          <circle cx="100" cy="100" r="86" fill="none" stroke="var(--border-soft)" stroke-width="1"/>
          <circle class="hero-ring" cx="100" cy="100" r="86" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="8 10" opacity=".55"/>
          <path d="M100 32 L156 54 V96 C156 132 132 158 100 172 C68 158 44 132 44 96 V54 Z"
                fill="var(--surface-2)" stroke="var(--accent)" stroke-width="2.5"/>
          <path d="M78 100 L94 116 L126 80" fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle class="hero-scan" cx="100" cy="100" r="6" fill="var(--accent-2)"/>
        </svg>
      </div>
 
      <h1 class="hero-title">Every exam, watched, graded<br/>and explained by AI.</h1>
      <p class="hero-sub">Timed assessments, live proctoring, and instant AI-generated feedback — one platform for candidates, admins and recruiters.</p>
 
      <button class="btn-primary" style="padding:14px 34px;font-size:15px;" onclick="renderRoleSelect()">Enter platform →</button>
 
      <div class="hero-stats">
        <div><span class="mono">10</span><span>modules</span></div>
        <div><span class="mono">3</span><span>roles</span></div>
        <div><span class="mono">AI</span><span>graded</span></div>
      </div>
    </div>
  </div>`);
}
 
/* ============================= ROLE SELECT ============================= */
const ROLE_META = {
  candidate: {
    label:'Candidate', color:'var(--accent)',
    desc:'Take proctored exams, answer MCQs and coding questions, and get an instant AI-graded report.',
    icon:`<svg viewBox="0 0 40 40" width="30" height="30" fill="none"><path d="M20 4 L34 10 V19 C34 27 28 34 20 36 C12 34 6 27 6 19 V10 Z" stroke="currentColor" stroke-width="2.2"/><path d="M14 20 L18 24 L27 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`
  },
  admin: {
    label:'Admin', color:'var(--accent-2)',
    desc:'Create exams, generate questions with AI, publish them, and review every candidate report.',
    icon:`<svg viewBox="0 0 40 40" width="30" height="30" fill="none"><rect x="6" y="9" width="28" height="20" rx="2.5" stroke="currentColor" stroke-width="2.2"/><path d="M6 15 H34" stroke="currentColor" stroke-width="2.2"/><circle cx="11" cy="12" r="1.2" fill="currentColor"/><path d="M13 22 H27 M13 26 H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`
  },
  recruiter: {
    label:'Recruiter', color:'var(--accent-3)',
    desc:'Browse the leaderboard, compare AI skill profiles, and see topic-wise performance across candidates.',
    icon:`<svg viewBox="0 0 40 40" width="30" height="30" fill="none"><path d="M9 32 V22 M19 32 V14 M29 32 V19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M8 16 L18 8 L26 13 L33 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
  }
};
 
function renderRoleSelect(){
  render(`
  ${topbar()}
  <div class="container" style="padding-top:56px;padding-bottom:60px;max-width:940px;">
    <div style="text-align:center;margin-bottom:36px;">
      <div class="kicker" style="justify-content:center;display:flex;">Continue as</div>
      <h2 style="font-size:26px;">Who's signing in?</h2>
    </div>
    <div class="grid-3">
      ${Object.entries(ROLE_META).map(([k,r])=>`
        <div class="role-card" style="--role-color:${r.color};" onclick="chooseRole('${k}')">
          <div class="role-icon">${r.icon}</div>
          <h3 style="font-size:17px;margin:14px 0 8px;">${r.label}</h3>
          <p class="subtle" style="font-size:13px;line-height:1.6;min-height:62px;">${r.desc}</p>
          <div class="role-cta">Continue as ${r.label} →</div>
        </div>
      `).join('')}
    </div>
  </div>`);
}
function chooseRole(r){ loginRole=r; loginMode='login'; renderAuthScreen(); }
 
/* ============================= AUTH SCREEN ============================= */
function renderAuthScreen(){
  const meta = ROLE_META[loginRole];
  render(`
  ${topbar()}
  <div class="container" style="max-width:440px;padding-top:44px;">
    <button class="btn-ghost" onclick="renderRoleSelect()" style="margin-bottom:14px;">← Choose a different role</button>
    <div class="card scanline" style="border-top:3px solid ${meta.color};">
      <div class="kicker" style="color:${meta.color};">${meta.label} sign in</div>
      <h2 style="font-size:21px;margin-bottom:18px;">${loginRole==='candidate' && loginMode==='signup' ? 'Create your account' : 'Welcome back'}</h2>
      <div id="loginFormArea"></div>
    </div>
  </div>`);
  renderLoginForm();
}
function setLoginMode(m){ loginMode=m; renderLoginForm(); }
 
function demoCredsTable(){
  if(loginRole==='admin'){
    const a = ADMIN_ACCOUNTS[0];
    return `
    <div class="divider"></div>
    <div class="kicker" style="margin-bottom:8px;">Demo credentials</div>
    <table>
      <thead><tr><th>Email</th><th>Password</th></tr></thead>
      <tbody><tr><td class="mono">${esc(a.email)}</td><td class="mono">${esc(a.password)}</td></tr></tbody>
    </table>`;
  }
  if(loginRole==='recruiter'){
    const r = RECRUITER_ACCOUNTS[0];
    return `
    <div class="divider"></div>
    <div class="kicker" style="margin-bottom:8px;">Demo credentials</div>
    <table>
      <thead><tr><th>Email</th><th>Password</th></tr></thead>

function findUserByEmail(email){
  email = email.toLowerCase().trim();
  const admin = ADMIN_ACCOUNTS.find(a=>a.email.toLowerCase()===email);
  if(admin) return { ...admin, role:'admin' };
  const rec = RECRUITER_ACCOUNTS.find(a=>a.email.toLowerCase()===email);
  if(rec) return { ...rec, role:'recruiter' };
  const cand = DB.candidates.find(c=>c.email.toLowerCase()===email);
  if(cand) return { ...cand, role:'candidate' };
  return null;
}
 
function doLogin(){
  const email = document.getElementById('liEmail').value.trim();

  if(!email || !pass){ setLoginErr('Enter both email and password.'); return; }
  const user = findUserByEmail(email);
  if(!user){ setLoginErr('Invalid credentials.'); return; }
  if(user.role !== loginRole){
    setLoginErr(`Invalid credentials. This account is not registered as ${loginRole.charAt(0).toUpperCase()+loginRole.slice(1)}.`);
    return;
  }
  if(user.password !== pass){ setLoginErr('Invalid credentials.'); return; }
  session = { role:user.role, email:user.email, name:user.name };
  toast(`Welcome back, ${user.name.split(' ')[0]}.`);
  if(session.role==='candidate') renderCandidateDashboard();
  else if(session.role==='admin') renderAdminPanel();
  else renderRecruiterDashboard();

function doSignup(){
  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim().toLowerCase();
  const pass = document.getElementById('suPass').value;
  if(!name || !email || !pass){ setLoginErr('Fill in all fields.'); return; }
  if(!email.endsWith(STUDENT_DOMAIN)){ setLoginErr(`Candidates must sign up with a ${STUDENT_DOMAIN} email address.`); return; }
  if(findUserByEmail(email)){ setLoginErr('An account with this email already exists.'); return; }

function attachSecurityListeners(){
  document.addEventListener('visibilitychange', onVisibility);
  document.addEventListener('fullscreenchange', onFullscreenChange);
  document.addEventListener('copy', blockAction);
  document.addEventListener('cut', blockAction);
  document.addEventListener('paste', blockAction);
  document.addEventListener('contextmenu', blockAction);
  window.addEventListener('beforeunload', beforeUnloadHandler);
}
function detachSecurityListeners(){
  document.removeEventListener('visibilitychange', onVisibility);
  document.removeEventListener('fullscreenchange', onFullscreenChange);
  document.removeEventListener('copy', blockAction);
  document.removeEventListener('cut', blockAction);
  document.removeEventListener('paste', blockAction);
  document.removeEventListener('contextmenu', blockAction);
  window.removeEventListener('beforeunload', beforeUnloadHandler);
}
function onVisibility(){
  if(document.hidden && attempt && attempt.active){
    attempt.tabSwitches += 1;
    logEvent(`Tab switched away (occurrence ${attempt.tabSwitches})`, RISK_WEIGHTS.tabSwitch);
  }
}
function onFullscreenChange(){
  if(!document.fullscreenElement && attempt && attempt.active){

}
function blockAction(e){
  if(attempt && attempt.active){ e.preventDefault(); logEvent(`${e.type} attempt blocked`, RISK_WEIGHTS.copyPaste); }

function beforeUnloadHandler(e){

async function startProctoring(){
  try{
    attempt.mediaStream = await navigator.mediaDevices.getUserMedia({ video:true });
    const video = document.getElementById('camPreview');
    if(video){ video.srcObject = attempt.mediaStream; video.play(); }
    attempt.faceDetector = ('FaceDetector' in window) ? new window.FaceDetector({ fastMode:true }) : null;
    updateProctorStatus('Camera connected', 'low');
    attempt.checkTimer = setInterval(checkFace, 4000);
  }catch(e){
    updateProctorStatus('Camera access denied', 'high');
    logEvent('Camera access denied — proctoring disabled for this session', RISK_WEIGHTS.cameraDenied);
  }
}
async function checkFace(){
  if(!attempt || !attempt.active) return;
  const video = document.getElementById('camPreview');
  const canvas = document.getElementById('camCanvas');
  if(!video || !video.srcObject || !canvas) return;
  const ctx = canvas.getContext('2d');
  try{ ctx.drawImage(video,0,0,160,120); }catch(e){ return; }
 
  if(attempt.faceDetector){
    try{
      const faces = await attempt.faceDetector.detect(canvas);
      handleFaceResult(faces.length);
      return;
    }catch(e){ /* fall through to heuristic below */ }
  }
  // Simplified fallback heuristic (demo-grade stand-in for MediaPipe/YOLO):
  // flags a frame as "no face" when it is unusually dark/uniform.
  const frame = ctx.getImageData(0,0,160,120).data;
  let sum=0;
  for(let i=0;i<frame.length;i+=4) sum += frame[i];
  const avg = sum/(frame.length/4);
  attempt.lastBrightness = avg;
  handleFaceResult(avg < 20 ? 0 : 1);
}
function handleFaceResult(faceCount){
  if(faceCount===0){
    attempt.faceMissingStart = attempt.faceMissingStart || Date.now();
    const missingSec = Math.floor((Date.now()-attempt.faceMissingStart)/1000);
    updateProctorStatus(`No face detected (${missingSec}s)`, 'high');
    if(missingSec>=10 && !attempt.faceFlagged){
      attempt.faceFlagged = true;
      logEvent(`Face not visible for ${missingSec}s`, RISK_WEIGHTS.faceMissing);
    }
  } else if(faceCount>1){
    updateProctorStatus('Multiple faces in frame', 'high');
    logEvent('Multiple faces detected in frame', RISK_WEIGHTS.multiFace);
    attempt.faceMissingStart = null; attempt.faceFlagged = false;
  } else {
    attempt.faceMissingStart = null; attempt.faceFlagged = false;
    updateProctorStatus('Face detected', 'low');
  }
}
function stopProctoring(){
  if(attempt.checkTimer) clearInterval(attempt.checkTimer);
  if(attempt.mediaStream) attempt.mediaStream.getTracks().forEach(t=>t.stop());

function renderQuestion(q){
  const idx = attempt.currentQ;

  if(q.type==='mcq'){
    const sel = attempt.answers[q.id];

            ${sel===i?'<div style="width:10px;height:10px;border-radius:50%;background:var(--accent);"></div>':''}
          </div>
          <span>${esc(opt)}</span>
        </div>`).join('')}
    `;
  }
  if(q.type==='coding'){
    const code = attempt.answers[q.id] !== undefined ? attempt.answers[q.id] : (q.starterCode || 'function solve() {\n  \n}');
    const results = attempt.codeResults[q.id];
    return `
      <div class="kicker">Question ${idx+1} of ${total} · Coding · ${esc(q.difficulty||'')}</div>
      <h3 style="font-size:17px;margin-bottom:10px;line-height:1.5;">${esc(q.text)}</h3>
      <p class="subtle" style="margin-bottom:14px;">Implement a JavaScript function named <code class="mono">solve</code>. Test cases run in-browser.</p>
      <textarea id="codeInput_${q.id}" rows="10" oninput="onCodeInput('${q.id}')">${esc(code)}</textarea>
      <div style="display:flex;gap:10px;margin-top:10px;">
        <button class="btn-secondary" onclick="runTests('${q.id}')">Run test cases</button>
      </div>
      <div id="testResults_${q.id}" style="margin-top:12px;">
        ${results ? renderTestResults(results) : ''}
      </div>
    `;
  }
  // subjective
  const val = attempt.answers[q.id] || '';
  return `
    <div class="kicker">Question ${idx+1} of ${total} · Subjective · ${esc(q.difficulty||'')}</div>
    <h3 style="font-size:17px;margin-bottom:14px;line-height:1.5;">${esc(q.text)}</h3>
    <textarea id="subInput_${q.id}" rows="8" oninput="onSubjectiveInput('${q.id}')" placeholder="Write your answer here...">${esc(val)}</textarea>
  `;
}
function renderTestResults(results){
  const passed = results.filter(r=>r.pass).length;
  return `<div class="subtle" style="margin-bottom:8px;">${passed} / ${results.length} test cases passed</div>` +
    results.map((r,i)=>`<div class="code-block" style="margin-bottom:6px;color:${r.pass?'var(--risk-low)':'var(--risk-high)'};">
      Test ${i+1}: ${r.pass?'PASS':'FAIL'} — input: ${esc(JSON.stringify(r.input))}, expected: ${esc(JSON.stringify(r.expected))}, got: ${esc(JSON.stringify(r.actual))}
    </div>`).join('');
}

function onCodeInput(qid){

function refreshPaletteOnly(){
  const exam = attempt.exam;
  document.querySelectorAll('.qdot').forEach((el,i)=>{
    const qq = exam.questions[i];
    el.className = `qdot ${attempt.answers[qq.id]!==undefined && attempt.answers[qq.id]!==''?'answered':''} ${i===attempt.currentQ?'current':''}`;
  });
}
function runTests(qid){
  const q = attempt.exam.questions.find(x=>x.id===qid);
  const code = document.getElementById('codeInput_'+qid).value;
  attempt.answers[qid] = code;
  const results = runCodeTests(code, q.testCases||[]);
  attempt.codeResults[qid] = results;
  document.getElementById('testResults_'+qid).innerHTML = renderTestResults(results);
  refreshPaletteOnly();
}
function runCodeTests(code, testCases){
  const results = [];
  let solve;
  try{
    const factory = new Function(code + '\nreturn (typeof solve==="function") ? solve : null;');
    solve = factory();
    if(!solve) throw new Error('Define a function named solve');
  }catch(e){
    testCases.forEach(tc => results.push({ ...tc, actual:'Error: '+e.message, pass:false }));
    return results;
  }
  testCases.forEach(tc=>{
    try{
      const out = solve(...(tc.input||[]));
      const pass = JSON.stringify(out) === JSON.stringify(tc.expected);
      results.push({ ...tc, actual: out, pass });
    }catch(e){
      results.push({ ...tc, actual:'Error: '+e.message, pass:false });
    }
  });
  return results;
}
 
function navQuestion(dir){
  attempt.currentQ = Math.max(0, Math.min(attempt.exam.questions.length-1, attempt.currentQ+dir));
  renderExamRunner();

function jumpQuestion(i){ attempt.currentQ = i; renderExamRunner(); }
 
function confirmSubmit(){
  const unanswered = attempt.exam.questions.filter(q=>attempt.answers[q.id]===undefined || attempt.answers[q.id]==='').length;
  const msg = unanswered>0 ? `You have ${unanswered} unanswered question(s). Submit anyway?` : 'Submit your exam? This cannot be undone.';
  if(confirm(msg)) submitExam();
}
 
async function submitExam(){
  attempt.active = false;
  detachSecurityListeners();
  if(attempt.timerId) clearInterval(attempt.timerId);
  stopProctoring();
  if(document.fullscreenElement){ try{ await document.exitFullscreen(); }catch(e){} }
 
  render(`${topbar()}<div class="container" style="padding-top:80px;text-align:center;"><h2>Grading your exam…</h2><p class="subtle">Running test cases and generating AI feedback. This takes a few seconds.</p></div>`);
 
  const exam = attempt.exam;
  const mcqQs = exam.questions.filter(q=>q.type==='mcq');
  const codingQs = exam.questions.filter(q=>q.type==='coding');
  const subjQs = exam.questions.filter(q=>q.type==='subjective');
 
  // MCQ grading
  let mcqCorrect = 0;
  mcqQs.forEach(q=>{ if(attempt.answers[q.id]===q.correctIndex) mcqCorrect++; });
  const mcqScore = mcqQs.length ? Math.round((mcqCorrect/mcqQs.length)*100) : null;
 
  // Coding grading (run any not-yet-run tests)
  let codingTotalPass=0, codingTotalCases=0;
  const codingReviews = {};
  for(const q of codingQs){
    const code = attempt.answers[q.id] || '';
    const results = attempt.codeResults[q.id] || runCodeTests(code, q.testCases||[]);
    codingTotalPass += results.filter(r=>r.pass).length;
    codingTotalCases += results.length;
    const review = await aiCodeReview(q, code, results);
    codingReviews[q.id] = { results, review };
  }
  const codingScore = codingTotalCases ? Math.round((codingTotalPass/codingTotalCases)*100) : null;
 
  // Subjective grading via AI
  const subjectiveResults = {};
  for(const q of subjQs){
    const ans = attempt.answers[q.id] || '';
    const evalResult = await aiSubjectiveEval(q, ans);
    subjectiveResults[q.id] = evalResult;
  }
  const subjScores = Object.values(subjectiveResults).map(r=>r.score).filter(n=>typeof n==='number');
  const subjectiveScore = subjScores.length ? Math.round(subjScores.reduce((a,b)=>a+b,0)/subjScores.length) : null;
 
  const parts = [mcqScore, codingScore, subjectiveScore].filter(n=>n!==null);
  const totalScore = parts.length ? Math.round(parts.reduce((a,b)=>a+b,0)/parts.length) : 0;
 
  const timeTakenMs = Date.now() - attempt.startTime;
  const riskReasons = attempt.events.map(e=>({ reason:e.reason, weight:e.weight }));
 
  const submission = {
    id: uid(),
    examId: exam.id,
    examTitle: exam.title,
    candidateEmail: session.email,
    candidateName: session.name,
    answers: attempt.answers,
    mcqScore, codingScore, subjectiveScore, totalScore,
    codingReviews, subjectiveResults,
    timeTakenMs,
    riskScore: attempt.riskScore,
    riskReasons,
    submittedAt: Date.now(),
    aiSummary: null
  };
 
  const summary = await aiPerformanceSummary(exam, submission);
  submission.aiSummary = summary;
 
  DB.submissions.push(submission);
  await saveDB();
  attempt = null;
  currentReportId = submission.id;
  toast('Exam submitted.');
  renderReport(submission.id);
}
 
async function aiCodeReview(question, code, results){
  const sys = "You are a strict but constructive code reviewer for an exam platform. Be concise, plain text, no markdown headers.";
  const failing = results.filter(r=>!r.pass).length;
  const user = `Question: ${question.text}\n\nCandidate code:\n${code}\n\nTest results: ${failing} failing out of ${results.length}.\n\nIn under 80 words, review code quality (readability, efficiency, correctness) and suggest one concrete improvement.`;
  const text = await callAI(sys, user, 300);
  return text ? text.trim() : 'AI review unavailable for this submission.';
}
async function aiSubjectiveEval(question, answer){
  const sys = "You are an exam grader. Return ONLY valid JSON, no markdown fences, no prose outside the JSON.";
  const user = `Question: ${question.text}\n\nCandidate answer:\n${answer || '(no answer given)'}\n\nScore the answer from 0-100 for correctness and depth, and give feedback in under 50 words. Return JSON: {"score": number, "feedback": "..."}`;
  const text = await callAI(sys, user, 300);
  const parsed = extractJSON(text);
  return parsed && typeof parsed.score==='number' ? parsed : { score:0, feedback:'AI evaluation unavailable.' };
}
async function aiPerformanceSummary(exam, submission){
  const sys = "You are an assessment analyst. Return ONLY valid JSON, no markdown fences, no prose outside the JSON.";
  const topics = [...new Set(exam.questions.map(q=>q.topic || exam.title))].join(', ');
  const flagText = submission.riskReasons.length ? submission.riskReasons.map(r=>r.reason).join('; ') : 'no integrity issues flagged';
  const user = `Candidate scored MCQ:${submission.mcqScore ?? 'N/A'}%, Coding:${submission.codingScore ?? 'N/A'}%, Subjective:${submission.subjectiveScore ?? 'N/A'}% on an exam covering: ${topics}. Proctoring log: ${flagText}. Return JSON exactly like: {"strengths":["...","..."],"improvements":["...","..."],"skillProfile":{"SkillName": 0-100},"recommendations":["...","..."]} with 2-3 items per array and 3-4 skills in skillProfile.`;
  const text = await callAI(sys, user, 600);
  return extractJSON(text) || { strengths:[], improvements:[], skillProfile:{}, recommendations:['AI summary unavailable — check your AI provider connection.'] };
}

function setAIStatus(msg){ const el=document.getElementById('aiStatus'); if(el) el.textContent = msg; }
 
async function generateAIQuestions(){
  const topic = document.getElementById('aiTopic').value.trim();
  const difficulty = document.getElementById('aiDifficulty').value;
  const count = Math.min(10, parseInt(document.getElementById('aiCount').value)||3);
  const qtype = document.getElementById('aiQType').value;
  if(!topic){ setAIStatus('Enter a topic first.'); return; }
  setAIStatus('Generating with AI…');
  const sys = "You are an exam question generator. Return ONLY valid JSON, no markdown fences, no prose outside the JSON.";
  let user;
  if(qtype==='mcq'){
    user = `Generate ${count} ${difficulty}-level multiple choice questions on "${topic}". Return a JSON array where each item is exactly: {"type":"mcq","topic":"${topic}","difficulty":"${difficulty}","text":"question text","options":["A","B","C","D"],"correctIndex":0,"explanation":"short explanation"}`;
  } else {
    user = `Generate ${count} ${difficulty}-level coding questions on "${topic}" that are solvable with a single JavaScript function named solve. Return a JSON array where each item is exactly: {"type":"coding","topic":"${topic}","difficulty":"${difficulty}","text":"problem statement that tells the candidate to implement function solve(...)","starterCode":"function solve() {\\n  \\n}","testCases":[{"input":[/*args*/],"expected":/*value*/}] (3 test cases)}`;
  }
  const text = await callAI(sys, user, 1000);
  if(text===null){ setAIStatus('AI generation failed: ' + (lastAIError || 'unknown error — check console/network tab.')); return; }
  const parsed = extractJSON(text);
  if(!parsed || !Array.isArray(parsed)){ setAIStatus('AI responded but not with valid question JSON. Try a simpler topic or lower count.'); return; }
  parsed.forEach(q=>{ q.id = uid(); draftQuestions.push(q); });
  setAIStatus(`Added ${parsed.length} AI-generated question(s) below. Review before publishing.`);
  renderDraftQuestions();
}

function saveManualMCQ(editId){
  const topic = document.getElementById('mcqTopic').value.trim();
  const difficulty = document.getElementById('mcqDifficulty').value;
  const text = document.getElementById('mcqText').value.trim();
  const options = [0,1,2,3].map(i=>document.getElementById('mcqOpt'+i).value.trim());
  const checked = document.querySelector('input[name="mcqCorrect"]:checked');
  const err = document.getElementById('mcqErr');
  if(!text){ err.textContent='Enter the question text.'; return; }
  if(options.some(o=>!o)){ err.textContent='Fill in all 4 options.'; return; }
  if(!checked){ err.textContent='Select which option is the correct answer.'; return; }
  const qObj = { id: editId || uid(), type:'mcq', topic, difficulty, text, options, correctIndex: parseInt(checked.value) };
  if(editId){
    const idx = draftQuestions.findIndex(x=>x.id===editId);
    if(idx>-1) draftQuestions[idx] = qObj;
  } else {
    draftQuestions.push(qObj);
  }
  closeModal();
  renderDraftQuestions();
  toast(editId ? 'Question updated.' : 'Question added.');
}

              <td>${e.timerMinutes} min</td>
              <td><span class="pill ${e.published?'risk-badge-low':'risk-badge-med'}">${e.published?'Published':'Draft'}</span></td>
              <td style="text-align:right;white-space:nowrap;">
                <button class="btn-ghost" onclick="toggleExamPublish('${e.id}')">${e.published?'Unpublish':'Publish'}</button>
                <button class="btn-danger" onclick="deleteExam('${e.id}')">Delete</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}
function toggleExamPublish(id){
  const exam = DB.exams.find(e=>e.id===id);
  exam.published = !exam.published;
  saveDB();
  renderAdminManage();
}
function deleteExam(id){
  if(!confirm('Delete this exam? Existing submissions will be kept but the exam will disappear from listings.')) return;
  DB.exams = DB.exams.filter(e=>e.id!==id);
  saveDB();
  renderAdminManage();
}
 
function renderAdminReports(){
  const area = document.getElementById('adminTabArea');
  const subs = [...DB.submissions].sort((a,b)=>b.submittedAt-a.submittedAt);
  area.innerHTML = subs.length===0 ? `<div class="card empty">No candidate submissions yet.</div>` : `
    <div class="card">
      <table>
        <thead><tr><th>Candidate</th><th>Exam</th><th>Total</th><th>Risk</th><th>Submitted</th><th></th></tr></thead>
        <tbody>
          ${subs.map(s=>{ const b=riskBand(s.riskScore); return `
            <tr>
              <td>${esc(s.candidateName)}<br/><span class="subtle">${esc(s.candidateEmail)}</span></td>
              <td>${esc(s.examTitle)}</td>
              <td class="mono">${s.totalScore}%</td>
              <td><span class="pill risk-badge-${b.cls}">${b.label} · ${s.riskScore}%</span></td>
              <td class="subtle">${new Date(s.submittedAt).toLocaleDateString()}</td>
              <td><button class="btn-ghost" onclick="viewReport('${s.id}')">View report</button></td>
            </tr>`; }).join('')}
        </tbody>
      </table>
    </div>
  `;
}
 
/* ============================= RECRUITER DASHBOARD ============================= */
function renderRecruiterDashboard(){
  if(!requireSession(['recruiter'])) return;
  const subs = DB.submissions;
  const avgScore = subs.length ? Math.round(subs.reduce((a,s)=>a+s.totalScore,0)/subs.length) : 0;
  const avgRisk = subs.length ? Math.round(subs.reduce((a,s)=>a+s.riskScore,0)/subs.length) : 0;
  const leaderboard = [...subs].sort((a,b)=>b.totalScore-a.totalScore).slice(0,10);
 
  // topic-wise performance
  const topicMap = {};
  subs.forEach(s=>{
    const exam = DB.exams.find(e=>e.id===s.examId);
    if(!exam) return;
    const topics = [...new Set(exam.questions.map(q=>q.topic || exam.title))];
    topics.forEach(t=>{
      topicMap[t] = topicMap[t] || { total:0, count:0 };
      topicMap[t].total += s.totalScore;
      topicMap[t].count += 1;
    });
  });
 
  render(`
    ${topbar()}
    <div class="container" style="padding-top:28px;padding-bottom:60px;">
      <div class="kicker">Recruiter</div>
      <h2 style="font-size:24px;margin-bottom:20px;">Candidate insights</h2>
 
      <div class="grid-3" style="margin-bottom:20px;">
        <div class="stat"><div class="stat-num">${subs.length}</div><div class="stat-label">Total submissions</div></div>
        <div class="stat"><div class="stat-num">${avgScore}%</div><div class="stat-label">Average score</div></div>
        <div class="stat"><div class="stat-num" style="color:${riskBand(avgRisk).color};">${avgRisk}%</div><div class="stat-label">Average risk</div></div>
      </div>
 
      <div class="grid-2" style="margin-bottom:20px;">
        <div class="card">
          <div class="kicker">Leaderboard</div>
          ${leaderboard.length===0 ? `<p class="subtle">No submissions yet.</p>` : `
          <table>
            <thead><tr><th>#</th><th>Candidate</th><th>Score</th><th>Risk</th></tr></thead>
            <tbody>
              ${leaderboard.map((s,i)=>{ const b=riskBand(s.riskScore); return `
                <tr style="cursor:pointer;" onclick="viewReport('${s.id}')">
                  <td class="mono">${i+1}</td>
                  <td>${esc(s.candidateName)}</td>
                  <td class="mono">${s.totalScore}%</td>
                  <td><span class="pill risk-badge-${b.cls}">${b.label}</span></td>
                </tr>`; }).join('')}
            </tbody>
          </table>`}
        </div>
        <div class="card">
          <div class="kicker">Topic-wise performance</div>
          ${Object.keys(topicMap).length===0 ? `<p class="subtle">No data yet.</p>` : Object.entries(topicMap).map(([t,d])=>{
            const avg = Math.round(d.total/d.count);
            return `<div style="margin-bottom:10px;">
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span>${esc(t)}</span><span class="mono">${avg}%</span></div>
              <div style="height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${avg}%;background:var(--accent);"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>
 
      <div class="card">
        <div class="kicker">All candidate skill profiles</div>
        ${subs.length===0 ? `<p class="subtle">No submissions yet.</p>` : `
        <table>
          <thead><tr><th>Candidate</th><th>Exam</th><th>Score</th><th>Risk</th><th>Top skill</th><th></th></tr></thead>
          <tbody>
            ${[...subs].sort((a,b)=>b.submittedAt-a.submittedAt).map(s=>{
              const b = riskBand(s.riskScore);
              const skills = (s.aiSummary && s.aiSummary.skillProfile) || {};
              const top = Object.entries(skills).sort((a,c)=>c[1]-a[1])[0];
              return `<tr>
                <td>${esc(s.candidateName)}</td>
                <td>${esc(s.examTitle)}</td>
                <td class="mono">${s.totalScore}%</td>
                <td><span class="pill risk-badge-${b.cls}">${b.label}</span></td>
                <td>${top ? esc(top[0])+' — '+top[1]+'%' : '—'}</td>
                <td><button class="btn-ghost" onclick="viewReport('${s.id}')">View</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  `);
}
 
/* ============================= BOOT ============================= */
init();
</script>
</body>
</html>
